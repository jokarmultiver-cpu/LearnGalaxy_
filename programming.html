<!DOCTYPE html>
<html>

<head>

<title>Programming Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:black;
padding:20px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#22c55e;
}

.creator{
font-size:14px;
color:#9ca3af;
}

/* DASHBOARD BUTTON */

.dashboard-btn{
background:#22c55e;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:14px;
margin-left:15px;
}

.dashboard-btn:hover{
background:#16a34a;
}

/* RIGHT HEADER */

.right{
display:flex;
align-items:center;
gap:15px;
}

/* FRAME */

iframe{
width:100%;
height:92vh;
border:none;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
Programming Hub
</div>

<div class="right">

<div class="creator">
Created by Jokar Kartiya
</div>

<button class="dashboard-btn" onclick="goDashboard()">
Dashboard
</button>

</div>

</div>

<!-- Programming Website -->

<iframe
src="https://jokarkartiya-cyber.github.io/Proagraming-hub/">
</iframe>


<script>

function goDashboard(){
window.location="../pages/index.html";
}

</script>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="../js/firebase.js"></script>

<script>

firebase.auth().onAuthStateChanged(function(user){

if(!user){

window.location="../pages/login.html"

}

})

</script>

</body>

</html>
