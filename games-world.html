<!DOCTYPE html>
<html>

<head>
<title>Galaxy Gaming Arena</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:#00ffcc;
overflow-x:hidden;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
font-size:30px;
background:linear-gradient(90deg,#000,#020617,#000);
box-shadow:0 0 30px #00ffcc;
}

.creator{
font-size:13px;
color:#9ca3af;
}

/* SEARCH */
.search{
text-align:center;
margin:15px;
}

.search input{
width:70%;
padding:12px;
font-size:16px;
background:black;
border:1px solid #00ffcc;
color:#00ffcc;
border-radius:8px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:20px;
}

/* CARD */
.card{
background:#0f172a;
padding:30px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 20px #00ffcc;
font-size:18px;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,#00ffcc,transparent);
transition:0.5s;
}

.card:hover::before{
left:100%;
}

.card:hover{
transform:scale(1.1);
background:#00ffcc;
color:black;
}

/* BUTTON */
button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#00ffcc;
cursor:pointer;
border-radius:5px;
}

/* FULLSCREEN GAME */
#gameBox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

#gameFrame{
width:100%;
height:100%;
border:none;
}

.close{
position:absolute;
top:10px;
right:20px;
background:red;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* LOADER */
.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#00ffcc;
font-size:20px;
}

/* FLOAT BUTTON */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#00ffcc;
color:black;
padding:15px;
border-radius:50%;
cursor:pointer;
box-shadow:0 0 20px #00ffcc;
}

/* CATEGORY TITLE */
.section{
padding:10px 20px;
font-size:22px;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="header">
🎮 GALAXY GAMING ARENA <br>
<span class="creator">Created by Jokar Kartiya</span>
</div>

<div class="search">
<input id="search" placeholder="Search any game..." onkeyup="searchGame()">
</div>

<!-- 🔥 TRENDING -->
<div class="section">🔥 Trending</div>
<div class="grid">

<div class="card" onclick="play('https://poki.com')">Poki<button>Play</button></div>
<div class="card" onclick="play('https://www.crazygames.com')">CrazyGames<button>Play</button></div>
<div class="card" onclick="play('https://www.y8.com')">Y8 Games<button>Play</button></div>

</div>

<!-- 🌍 GLOBAL -->
<div class="section">🌍 Global Platforms</div>
<div class="grid">

<div class="card" onclick="play('https://store.steampowered.com')">Steam<button>Open</button></div>
<div class="card" onclick="play('https://www.epicgames.com')">Epic Games<button>Open</button></div>
<div class="card" onclick="play('https://www.miniclip.com')">Miniclip<button>Play</button></div>

</div>

<!-- 🇮🇳 INDIA -->
<div class="section">🇮🇳 India</div>
<div class="grid">

<div class="card" onclick="play('https://ff.garena.com')">Free Fire<button>Play</button></div>
<div class="card" onclick="play('https://www.pubg.com')">BGMI / PUBG<button>Play</button></div>
<div class="card" onclick="play('https://www.callofduty.com')">COD<button>Play</button></div>

</div>

<!-- 🇺🇸 USA -->
<div class="section">🇺🇸 USA</div>
<div class="grid">

<div class="card" onclick="play('https://www.fortnite.com')">Fortnite<button>Play</button></div>
<div class="card" onclick="play('https://www.minecraft.net')">Minecraft<button>Play</button></div>
<div class="card" onclick="play('https://www.roblox.com')">Roblox<button>Play</button></div>

</div>

<!-- 🇯🇵 JAPAN -->
<div class="section">🇯🇵 Japan</div>
<div class="grid">

<div class="card" onclick="play('https://genshin.hoyoverse.com')">Genshin Impact<button>Play</button></div>
<div class="card" onclick="play('https://www.nintendo.com')">Nintendo<button>Open</button></div>

</div>

<!-- FULLSCREEN -->
<div id="gameBox">
<div class="close" onclick="closeGame()">❌ Exit</div>
<div class="loader" id="loader">Loading Game...</div>
<iframe id="gameFrame"></iframe>
</div>

<!-- FLOAT -->
<div class="float" onclick="alert('More features coming 😎')">⚡</div>

<script>

/* PLAY GAME */
function play(url){
let box=document.getElementById("gameBox");
let frame=document.getElementById("gameFrame");
let loader=document.getElementById("loader");

box.style.display="block";
loader.style.display="block";

frame.src=url;

/* SOUND */
let audio=new Audio("https://www.soundjay.com/button/beep-07.wav");
audio.play();

setTimeout(()=>{
loader.style.display="none";
},1500);
}

/* CLOSE */
function closeGame(){
document.getElementById("gameBox").style.display="none";
document.getElementById("gameFrame").src="";
}

/* SEARCH */
function searchGame(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
});
}

</script>

</body>
</html>
