<!DOCTYPE html>
<html>

<head>

<title>Cricket Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:26px;
color:#22c55e;
font-weight:bold;
}

.dashboard-btn{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
color:white;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(450px,1fr));
gap:25px;
padding:25px;
}

.card{
background:#0f172a;
border-radius:15px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card h2{
color:#22c55e;
}

iframe{
width:100%;
height:400px;
border:none;
border-radius:10px;
}

.full-btn{
margin-top:10px;
background:#6366f1;
border:none;
padding:8px 15px;
border-radius:6px;
color:white;
cursor:pointer;
}

.link-btn{
display:block;
margin-top:10px;
padding:10px;
background:#22c55e;
text-align:center;
border-radius:8px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
Cricket Hub
</div>

<button class="dashboard-btn" onclick="goDashboard()">
Back to Dashboard
</button>

</div>


<div class="container">


<!-- LIVE SCORE -->

<div class="card">

<h2>Live Score</h2>

<iframe src="https://www.cricbuzz.com/cricket-match/live-scores"></iframe>

<button class="full-btn" onclick="openFull('https://www.cricbuzz.com/cricket-match/live-scores')">
Full Screen
</button>

</div>



<!-- MATCH SCHEDULE -->

<div class="card">

<h2>Match Schedule</h2>

<iframe src="https://www.espncricinfo.com/live-cricket-score"></iframe>

<button class="full-btn" onclick="openFull('https://www.espncricinfo.com/live-cricket-score')">
Full Screen
</button>

</div>



<!-- CRICKET NEWS -->

<div class="card">

<h2>Cricket News</h2>

<iframe src="https://www.espncricinfo.com/cricket-news"></iframe>

<button class="full-btn" onclick="openFull('https://www.espncricinfo.com/cricket-news')">
Full Screen
</button>

</div>



<!-- HIGHLIGHTS -->

<div class="card">

<h2>Latest Highlights</h2>

<iframe src="https://www.youtube.com/embed?listType=search&list=latest+cricket+highlights"></iframe>

<button class="full-btn" onclick="openFull('https://www.youtube.com/results?search_query=latest+cricket+highlights')">
Full Screen
</button>

</div>



<!-- WATCH LIVE -->

<div class="card">

<h2>Watch Live</h2>

<a class="link-btn" href="https://www.hotstar.com" target="_blank">
Watch on Hotstar
</a>

<a class="link-btn" href="https://www.sonyliv.com" target="_blank">
Watch on SonyLIV
</a>

<a class="link-btn" href="https://www.jiocinema.com" target="_blank">
Watch on JioCinema
</a>

<a class="link-btn" href="https://www.youtube.com/results?search_query=live+cricket+match">
Free Live (YouTube)
</a>

</div>


</div>


<script>

function goDashboard(){
window.location="../pages/index.html";
}

function openFull(url){
window.open(url,"_blank");
}

</script>

</body>

</html>
